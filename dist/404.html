<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
        // GitHub Pages SPA redirect for project repo: /AI-CONCLAVE-CA/
        // Sends unknown routes (e.g. /AI-CONCLAVE-CA/register) back to index.html
        // so React Router can handle client-side routing.
        var segmentCount = 1; // number of path segments in the repo base (1 = /AI-CONCLAVE-CA/)
        var l = window.location;
        l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1 + segmentCount).join('/') +
            '/?p=/' + l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
            (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        );
    </script>
</head>

<body></body>

</html>
